<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#071018" />
  <meta name="description" content="Free Kick Legend: a fast, skill-based pixel football game. Bend impossible free kicks, win five cups, and build your own matchday style." />
  <meta property="og:title" content="Free Kick Legend" />
  <meta property="og:description" content="Bend the ball, beat the wall, become a pixel football legend." />
  <meta property="og:type" content="website" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Free Kick Legend — Night Match '98</title>
  <!-- CrazyGames SDK v3: disabled automatically away from supported/local environments. -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' shape-rendering='crispEdges'%3E%3Crect width='16' height='16' fill='%23071018'/%3E%3Crect x='4' y='2' width='8' height='2' fill='%23f3e7c3'/%3E%3Crect x='2' y='4' width='12' height='8' fill='%23f3e7c3'/%3E%3Crect x='4' y='12' width='8' height='2' fill='%23a8b0ae'/%3E%3Crect x='6' y='5' width='4' height='2' fill='%23071018'/%3E%3Crect x='4' y='8' width='2' height='2' fill='%23071018'/%3E%3Crect x='10' y='8' width='2' height='2' fill='%23071018'/%3E%3C/svg%3E" />
  <style>
    :root {
      color-scheme: dark;
      --ink: #071018;
      --night: #0b1624;
      --panel: #13263a;
      --panel-hi: #213a52;
      --cream: #f3e7c3;
      --gold: #f3c449;
      --grass: #185b38;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: var(--ink);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: "Arial Black", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 50% 18%, rgba(63, 116, 148, 0.22), transparent 35%),
        linear-gradient(180deg, #102337 0 48%, #071018 48% 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(255,255,255,0.04) 3px 4px),
        repeating-linear-gradient(90deg, transparent 0 11px, rgba(0,0,0,0.12) 11px 12px);
    }

    #app {
      position: fixed;
      inset: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
      display: flex;
      align-items: center;
      justify-content: center;
      isolation: isolate;
    }

    canvas {
      display: block;
      image-rendering: auto;
      outline: 2px solid rgba(154, 117, 64, 0.52);
      box-shadow: 0 12px 44px rgba(3, 9, 15, 0.78), 0 0 0 4px rgba(7, 16, 24, 0.82);
    }

    #loading,
    #rotate {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: calc(20px + var(--safe-top)) calc(20px + var(--safe-right)) calc(20px + var(--safe-bottom)) calc(20px + var(--safe-left));
      color: var(--cream);
      background: var(--ink);
    }

    #loading {
      transition: opacity 180ms steps(3, end), visibility 180ms;
    }

    #loading.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .boot-card {
      width: min(82vw, 340px);
      text-align: center;
    }

    .boot-kicker {
      display: block;
      color: var(--gold);
      font-size: clamp(12px, 3.4vw, 18px);
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .boot-title {
      margin: 4px 0 15px;
      color: var(--cream);
      font-size: clamp(28px, 8vw, 48px);
      line-height: 0.88;
      letter-spacing: -0.06em;
      text-shadow: 4px 4px 0 #13263a;
    }

    .boot-meter {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 3px;
      height: 12px;
      padding: 3px;
      border: 2px solid #9a7540;
      background: #13263a;
    }

    .boot-meter span {
      background: var(--gold);
      animation: boot-pulse 1.1s steps(1, end) infinite;
      animation-delay: calc(var(--i) * 65ms);
    }

    .boot-note {
      margin-top: 10px;
      color: #8fa2ab;
      font: 700 10px/1.3 "Courier New", monospace;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #rotate {
      display: none;
      background:
        linear-gradient(180deg, rgba(19, 38, 58, 0.96), rgba(7, 16, 24, 0.99)),
        var(--ink);
    }

    .rotate-card {
      max-width: 300px;
      text-align: center;
    }

    .phone-pixel {
      width: 42px;
      height: 68px;
      margin: 0 auto 24px;
      border: 5px solid var(--cream);
      box-shadow: 5px 5px 0 #9a7540;
      animation: rotate-phone 1.8s steps(6, end) infinite;
    }

    .rotate-card strong {
      display: block;
      color: var(--gold);
      font-size: 19px;
      line-height: 1.05;
      letter-spacing: 0.03em;
    }

    .rotate-card small {
      display: block;
      margin-top: 9px;
      color: #a8b0ae;
      font: 700 11px/1.4 "Courier New", monospace;
    }

    noscript {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--cream);
      background: var(--ink);
      text-align: center;
    }

    @keyframes boot-pulse {
      0%, 18% { opacity: 0.18; }
      19%, 100% { opacity: 1; }
    }

    @keyframes rotate-phone {
      0%, 35% { transform: rotate(0deg); }
      65%, 100% { transform: rotate(90deg); }
    }

    @media (orientation: portrait) and (max-width: 820px) and (pointer: coarse) {
      #rotate { display: grid; }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      canvas { outline: 0; box-shadow: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Free Kick Legend game"></main>

  <div id="loading" role="status" aria-live="polite">
    <div class="boot-card">
      <span class="boot-kicker">Night match '98</span>
      <div class="boot-title">FREE KICK<br />LEGEND</div>
      <div class="boot-meter" aria-hidden="true">
        <span style="--i:0"></span><span style="--i:1"></span><span style="--i:2"></span>
        <span style="--i:3"></span><span style="--i:4"></span><span style="--i:5"></span>
        <span style="--i:6"></span><span style="--i:7"></span><span style="--i:8"></span>
        <span style="--i:9"></span><span style="--i:10"></span><span style="--i:11"></span>
      </div>
      <div class="boot-note">Preparing the floodlights</div>
    </div>
  </div>

  <aside id="rotate" aria-label="Rotate device to landscape">
    <div class="rotate-card">
      <div class="phone-pixel" aria-hidden="true"></div>
      <strong>ROTATE FOR KICK-OFF</strong>
      <small>Free Kick Legend is built for landscape play.</small>
    </div>
  </aside>

  <noscript>JavaScript is required to play Free Kick Legend.</noscript>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
